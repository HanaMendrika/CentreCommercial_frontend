<aside class="sidebar">
  <div class="brand">
    <div class="brand-icon"><img src="/logo/logoTrans.png" alt="Logo"></div>
    <!-- <p class="brand-name">Centre Commercial</p> -->
    <!-- <p class="brand-sub">Espace boutique</p> -->
    <div class="user-row">
      <div class="user-avatar">{{ initiale }}</div>
      <div>
        <div class="user-name">{{ user?.matricule }}</div>
        <div class="user-role">Boutique</div>
      </div>
    </div>

    

  <nav>
  @for (item of nav; track item.path) {
    <a class="nav-link"
       [routerLink]="['/boutique', item.path]"
       routerLinkActive="active">
      <span class="nav-icon">
        <img [src]="item.icon" [alt]="item.label" class="nav-img">
      </span>
      {{ item.label }}
    </a>
  }
</nav>

  <div class="sidebar-footer">
  
    <button class="btn-logout" (click)="logout()">↩ Déconnexion</button>
  </div>

  </div>

</aside>

<main class="main">
  <router-outlet />
</main>
